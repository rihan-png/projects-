    const cyberStyles = `
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff003c;
    --neon-yellow: #fcee0a;
    --dark-bg: #030305;
    --panel-bg: rgba(3, 3, 5, 0.7);
    --grid-color: rgba(0, 240, 255, 0.07);
  }

  body {
    background-color: var(--dark-bg);
    color: var(--neon-cyan);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
    scroll-behavior: smooth;
  }

  .font-mono-tech { font-family: 'Share Tech Mono', monospace; }
  .font-display { font-family: 'Orbitron', sans-serif; }

  /* CRT Scanline Overlay */
  .crt-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(
      rgba(18, 16, 16, 0) 50%,
      rgba(0, 0, 0, 0.25) 50%
    );
    background-size: 100% 4px;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.4;
  }

  /* Glitch Text Effect */
  .glitch {
    position: relative;
    display: inline-block;
  }
  .glitch::before,
  .glitch::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
  }
  .glitch::before {
    left: 2px;
    text-shadow: -2px 0 var(--neon-magenta);
    clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
    animation: glitch-anim 2s infinite linear alternate-reverse;
  }
  .glitch::after {
    left: -2px;
    text-shadow: -2px 0 var(--neon-cyan);
    clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
    animation: glitch-anim2 3s infinite linear alternate-reverse;
  }
  
  .glitch-hover:hover {
    animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
  }

  @keyframes glitch-anim {
    0% { clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%); }
    20% { clip-path: polygon(0 20%, 100% 20%, 100% 44%, 0 44%); }
    40% { clip-path: polygon(0 40%, 100% 40%, 100% 60%, 0 60%); }
    60% { clip-path: polygon(0 60%, 100% 60%, 100% 20%, 0 20%); }
    80% { clip-path: polygon(0 80%, 100% 80%, 100% 80%, 0 80%); }
    100% { clip-path: polygon(0 10%, 100% 10%, 100% 30%, 0 30%); }
  }
  @keyframes glitch-anim2 {
    0% { clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%); }
    20% { clip-path: polygon(0 80%, 100% 80%, 100% 100%, 0 100%); }
    40% { clip-path: polygon(0 10%, 100% 10%, 100% 40%, 0 40%); }
    60% { clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%); }
    80% { clip-path: polygon(0 50%, 100% 50%, 100% 70%, 0 70%); }
    100% { clip-path: polygon(0 90%, 100% 90%, 100% 100%, 0 100%); }
  }
  @keyframes glitch-skew {
    0% { transform: skew(0deg); }
    20% { transform: skew(-10deg); }
    40% { transform: skew(10deg); }
    60% { transform: skew(-5deg); }
    80% { transform: skew(5deg); }
    100% { transform: skew(0deg); }
  }

  /* Cyberpunk UI Elements */
  .cyber-button {
    clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
    position: relative;
    transition: all 0.3s ease;
    background: rgba(0, 240, 255, 0.05);
    border: 1px solid rgba(0, 240, 255, 0.3);
  }
  .cyber-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }
  .cyber-button:hover::before {
    transform: translateX(100%);
  }
  .cyber-button::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 15px;
    height: 15px;
    background-color: var(--neon-cyan);
    clip-path: polygon(100% 0, 100% 100%, 0 100%);
    transition: all 0.3s ease;
  }
  .cyber-button:hover {
    background: rgba(0, 240, 255, 0.15);
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
  }
  .cyber-button.primary::after {
    background-color: var(--neon-magenta);
  }
  .cyber-button.primary:hover::after {
    background-color: var(--neon-cyan);
    width: 100%;
    height: 2px;
    clip-path: none;
  }

  .cyber-panel {
    clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
    border: 1px solid rgba(0, 240, 255, 0.15);
    background: linear-gradient(135deg, rgba(0,240,255,0.03) 0%, rgba(0,0,0,0.6) 100%);
    backdrop-filter: blur(10px);
    position: relative;
  }
  .cyber-panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 20px;
    width: 30px;
    height: 2px;
    background-color: var(--neon-cyan);
  }

  /* Form Elements */
  .cyber-input {
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(0, 240, 255, 0.2);
    color: var(--neon-cyan);
    font-family: 'Share Tech Mono', monospace;
    transition: all 0.3s ease;
    clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
  }
  .cyber-input:focus {
    outline: none;
    border-color: var(--neon-magenta);
    box-shadow: inset 0 0 10px rgba(255, 0, 60, 0.2);
  }
  
  /* Animated Grid */
  .bg-grid {
    background-size: 50px 50px;
    background-image: 
      linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
    mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 80%);
    animation: grid-move 20s linear infinite;
  }

  @keyframes grid-move {
    0% { background-position: 0 0; }
    100% { background-position: 50px 50px; }
  }

  .cursor-blink {
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Floating animation */
  .float {
    animation: floating 4s ease-in-out infinite;
  }
  @keyframes floating {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
  }
`;

    const BootSequence = ({ onComplete }) => {
      const [lines, setLines] = useState([]);
      const bootText = [
        "INITIATING NEXUS PROTOCOL // v9.0.4",
        "ESTABLISHING SECURE CONNECTION...",
        "MEM CHECK ... OK [64 TB]",
        "LOCATING CAMPUS NODES...",
        "NODE FOUND: SECTOR 7G",
        "BYPASSING OPTICAL FIREWALLS ... SUCCESS",
        "SYNCING AMBASSADOR BIOMETRICS ...",
        "ACCESS GRANTED.",
        "WAKING SYSTEM OVERSEER..."
      ];

      useEffect(() => {
        let currentLine = 0;
        const interval = setInterval(() => {
          if (currentLine < bootText.length) {
            setLines(prev => [...prev, bootText[currentLine]]);
            currentLine++;
          } else {
            clearInterval(interval);
            setTimeout(onComplete, 600);
          }
        }, 250);

        return () => clearInterval(interval);
      }, [onComplete]);

      return (
        <div className="fixed inset-0 bg-[#030305] z-[999] flex flex-col justify-center items-start p-8 md:p-24 font-mono-tech text-[#00f0ff] text-lg sm:text-xl md:text-2xl">
          <div className="max-w-3xl w-full">
            {lines.map((line, index) => (
              <div key={index} className="mb-2 flex items-start">
                <span className="text-[#ff003c] mr-4 mt-1">{`>`}</span>
                <span className="leading-tight">{line}</span>
              </div>
            ))}
            {lines.length < bootText.length && (
              <div className="flex items-center mt-2">
                <span className="text-[#ff003c] mr-4">{`>`}</span>
                <span className="w-3 h-6 bg-[#00f0ff] cursor-blink"></span>
              </div>
            )}
          </div>
        </div>
      );
    };

          <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center opacity-50">

            <div className="w-[1px] h-12 bg-gradient-to-b from-[#00f0ff] to-transparent"></div>
          </div>

    };

    const AmbassadorProtocols = () => {

            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
              {protocols.map((protocol, idx) => (
                <div key={idx} className={`cyber-panel p-8 group ${protocol.bgHover} transition-colors duration-500 relative overflow-hidden flex flex-col h-full`}>
                  <div className={`absolute top-0 right-0 w-16 h-16 bg-gradient-to-bl ${protocol.color.replace('text-', 'from-')} to-transparent opacity-10 group-hover:opacity-30 transition-opacity`}></div>

          <div className="max-w-4xl mx-auto cyber-panel p-1">
            <div className="bg-[#030305] p-8 md:p-12 relative overflow-hidden" style={{ clipPath: 'polygon(19px 0, 100% 0, 100% calc(100% - 19px), calc(100% - 19px) 100%, 0 100%, 0 19px)'}}>

              <div className="flex items-center gap-3 mb-8">
                <Terminal className="text-[#00f0ff] w-6 h-6" />
                <h2 className="font-display text-2xl md:text-3xl font-bold tracking-widest text-white uppercase glitch-hover" data-text="Initiate Neural Handshake">
                  Initiate Neural Handshake

              </div>

              <form className="space-y-6 relative z-10" onSubmit={(e) => e.preventDefault()}>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="space-y-2">
